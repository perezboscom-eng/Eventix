<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventix - Música</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="nav-brand">
            <img src="images/logoeventix.png" alt="logo" class="icon-img" style="width:24px;height:24px;vertical-align:middle;">
            <span>Eventix</span>
        </div>
        <div class="nav-actions">
            <img src="images/iconomenu.png" alt="menú" class="icon-img menu-toggle" style="width:18px;height:18px;vertical-align:middle;">
            <a href="usuario.html">
                <img src="images/iconousuario.png" alt="usuario" class="icon-img user-profile" style="width:18px;height:18px;vertical-align:middle;">
            </a>
        </div>
    </header>

    <main class="service-detail-container">
        <div class="service-card-detail">
            <h2>Música</h2>
            
            <div class="service-icon-wrapper">
                <img src="images/musica.png" alt="música" class="icon-img service-big-icon" style="width:60px;height:60px;">
            </div>

            <p class="service-desc-main">DJs, bandas en vivo y sonido profesional</p>
            
            <div class="pricing-section">
                <span class="pricing-label">Desde</span>
                <span class="pricing-value">$50.000 <span class="pricing-sub">aproximado</span></span>
            </div>

            <h3>Características incluidas:</h3>
            <ul class="features-list">
                <li><img src="images/tilde.png" alt="check" class="icon-img" style="width:14px;height:14px;vertical-align:middle;"> Sonido e iluminación profesional</li>
                <li><img src="images/tilde.png" alt="check" class="icon-img" style="width:14px;height:14px;vertical-align:middle;"> DJ en vivo para toda la fiesta</li>
                <li><img src="images/tilde.png" alt="check" class="icon-img" style="width:14px;height:14px;vertical-align:middle;"> Técnica y soporte durante el evento</li>
            </ul>

            <h3>Proveedores recomendados:</h3>
            <div class="providers-list">
                <span class="provider-tag"><img src="images/estrella.png" alt="estrella" class="icon-img" style="width:14px;height:14px;vertical-align:middle;"> Pro Sound</span>
                <span class="provider-tag"><img src="images/estrella.png" alt="estrella" class="icon-img" style="width:14px;height:14px;vertical-align:middle;"> Eventos Beats</span>
            </div>

            <a href="contacto.html" class="btn-link-wrapper">
                <button type="button" class="btn-submit">
                    Solicitar cotización
                </button>
            </a>
        </div>

        <footer class="service-footer">
            <a href="index.html" class="btn-back">
                <img src="images/logoeventix.png" alt="logo" class="icon-img" style="width:16px;height:16px;vertical-align:middle;"> Volver al inicio
            </a>
        </footer>
    </main>

</body>
</html>
