<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventix - Contacto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="contact-container">
        <header class="contact-header">
            <div class="logo">
                <img src="images/logoeventix.png" alt="ícono logo" class="icon-img" style="width:20px;height:20px;vertical-align:middle;">
                Eventix
            </div>
            <h1>Contacto</h1>
            <p class="subtitle">¿Tienes preguntas? Estamos aquí para ayudarte a organizar el evento perfecto</p>
        </header>

        <main class="contact-card">
            <h2>Envíanos un mensaje</h2>
            <form id="form-contacto">

                <div class="form-group-full">
                    <label>Nombre completo <span class="required">*</span></label>
                    <input type="text" name="nombre" id="nombre" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Email <span class="required">*</span></label>
                        <input type="email" name="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label>Teléfono <span class="required">*</span></label>
                        <input type="tel" name="telefono" id="telefono" required>
                    </div>
                </div>

                <div class="form-group-full">
                    <label>Asunto <span class="required">*</span></label>
                    <select name="asunto" id="asunto" required>
                        <option value="" disabled selected>Selecciona un asunto</option>
                        <option value="Pedir presupuesto">Pedir presupuesto</option>
                        <option value="Consultar disponibilidad">Consultar disponibilidad</option>
                        <option value="Soporte técnico">Soporte técnico</option>
                        <option value="Otro motivo">Otro motivo</option>
                    </select>
                </div>

                <div class="form-group-full">
                    <label>Mensaje</label>
                    <textarea name="mensaje" id="mensaje" rows="4"></textarea>
                </div>

                <button type="submit" class="btn-submit">
                    <img src="images/enviar.png" alt="ícono enviar" class="icon-img" style="width:16px;height:16px;vertical-align:middle;">
                    Enviar mensaje
                </button>
            </form>
        </main>

        <section class="whatsapp-card">
            <h3>¿Necesitas ayuda inmediata?</h3>
            <p>Nuestro equipo está disponible para atenderte por WhatsApp</p>
            <a href="https://wa.me/542613904697" target="_blank" class="btn-whatsapp">
                Chatear por WhatsApp
            </a>
        </section>

        <footer class="contact-footer">
            <a href="index.html" class="btn-back">
                <img src="images/logoeventix.png" alt="ícono logo" class="icon-img" style="width:16px;height:16px;vertical-align:middle;">
                Volver al inicio
            </a>
        </footer>
    </div>

    <script>
        // Capturamos el formulario, igual que en el ejemplo de clase
        const formContacto = document.getElementById('form-contacto');

        formContacto.addEventListener('submit', async (e) => {
            e.preventDefault(); // Evita que la página se recargue

            // Recolectamos los valores de los inputs usando sus IDs
            const nombre = document.getElementById('nombre').value;
            const email = document.getElementById('email').value;
            const telefono = document.getElementById('telefono').value;
            const asunto = document.getElementById('asunto').value;
            const mensaje = document.getElementById('mensaje').value;

            if (!nombre || !email || !telefono || !asunto) {
                alert("Por favor, completa todos los campos obligatorios (*).");
                return;
            }

            try {
                const respuesta = await fetch('/api/contacto', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre, email, telefono, asunto, mensaje })
                });

                const datos = await respuesta.json();

                if (datos.status === 'success') {
                    alert('¡Mensaje enviado correctamente! Nos pondremos en contacto pronto.');
                    formContacto.reset(); 
                } else {
                    alert('Hubo un error al guardar el mensaje: ' + datos.error);
                }
            } catch (error) {
                console.error('Error de conexión:', error);
                alert('No se pudo conectar con el servidor para enviar el mensaje.');
            }
        });
    </script>

</body>
</html>
